services:
  db:
    image: postgres:15-alpine
    container_name: shop-postgres
    restart: always
    environment:
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - shop_pg_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: shop-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/shop_db

volumes:
  shop_pg_data: